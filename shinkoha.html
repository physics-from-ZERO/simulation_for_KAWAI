<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>横波 進行波</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: #000;
      height: 100dvh;
      overflow: hidden;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      padding: 8px;
      gap: 6px;
    }

    h3 {
      color: #0ff;
      font-size: clamp(14px, 3.5vw, 20px);
      flex-shrink: 0;
    }

    /* ---- ボタン群 ---- */
    #controls {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 4px;
      flex-shrink: 0;
    }
    button {
      padding: 6px 2px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #111;
      color: #ddd;
      cursor: pointer;
      font-size: clamp(10px, 2.5vw, 14px);
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
      min-height: 32px;
    }
    button:active { background: #222; }
    .selected-direction {
      background-color: #00aaff !important;
      color: #fff !important;
      font-weight: bold;
    }

    /* ---- キャンバス領域 ---- */
    .canvas-wrap {
      flex: 1 1 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    #myCanvas {
      flex: 5;
      min-height: 0;
    }
    #timeCanvas {
      flex: 4;
      min-height: 0;
    }
    canvas {
      display: block;
      width: 100%;
      background: #000;
      border-radius: 4px;
    }
  </style>
</head>
<body>
<div id="app">
  <h3>進行波（横波）</h3>

  <div id="controls">
    <button id="start">▶ 再生</button>
    <button id="stop">⏸ 停止</button>
    <button id="dirx">→ 右向き進行波</button>
    <button id="dirxx">← 左向き進行波</button>
    <button id="sph">普通の速度</button>
    <button id="spl">ゆっくり</button>
    <button id="sizeToggle">小さい媒質で表示</button>
  </div>

  <div class="canvas-wrap">
    <canvas id="myCanvas"></canvas>
    <canvas id="timeCanvas"></canvas>
  </div>
</div>

<script>
  // =========================
  // 要素取得
  // =========================
  const canvas     = document.getElementById("myCanvas");
  const ctx        = canvas.getContext("2d");
  const timeCanvas = document.getElementById("timeCanvas");
  const tctx       = timeCanvas.getContext("2d");

  const btnStart = document.getElementById("start");
  const btnStop  = document.getElementById("stop");
  const btnDirR  = document.getElementById("dirx");
  const btnDirL  = document.getElementById("dirxx");
  const btnFast  = document.getElementById("sph");
  const btnSlow  = document.getElementById("spl");

  // =========================
  // 論理座標系（固定）— 全物理量はここで定義
  // 画面サイズが変わってもこれらの値は一切変わらない
  // =========================
  const BASE_W  = 770;     // 上グラフの論理幅
  const BASE_H  = 420;     // 上グラフの論理高さ（タイトル余白含む）
  const TBASE_W = 770;     // 下グラフの論理幅
  const TBASE_H = 300;     // 下グラフの論理高さ

  let   particleR     = 20;     // 粒子の直径（描画間隔）— ボタンで切替
  const PARTICLE_R_L  = 20;     // 大きい媒質
  const PARTICLE_R_S  = 10;     // 小さい媒質
  let   particleSizeSmall = false;
  const AXIS_X      = 100;    // 原点のx位置
  const AMP         = 80;     // 波の振幅
  const WAVELENGTH  = 360;    // 波長
  const FONT_SIZE   = 28;     // 基本フォントサイズ
  const TITLE_SIZE  = 34;     // タイトルフォントサイズ
  const ARROW_LEN   = 20;     // 矢頭の長さ
  const TICK_LEN    = 8;      // 目盛り線の長さ
  const LINE_W      = 2;      // 軸線の太さ
  const STROBE_R    = 10;     // ストロボ点の半径
  const DOT_R       = 10;     // 時間グラフの赤玉半径

  // =========================
  // Canvas設定（レスポンシブ）
  // =========================
  let CW = 0, CH = 0, TCW = 0, TCH = 0;
  const DPR = Math.min(window.devicePixelRatio || 1, 2);

  function syncCanvasSize() {
    const rect1 = canvas.getBoundingClientRect();
    const rect2 = timeCanvas.getBoundingClientRect();

    canvas.width      = Math.round(rect1.width  * DPR);
    canvas.height     = Math.round(rect1.height * DPR);
    timeCanvas.width  = Math.round(rect2.width  * DPR);
    timeCanvas.height = Math.round(rect2.height * DPR);

    CW  = canvas.width;
    CH  = canvas.height;
    TCW = timeCanvas.width;
    TCH = timeCanvas.height;
  }

  function onResize() {
    syncCanvasSize();
    drawOnly(performance.now(), simTime);
  }
  const ro = new ResizeObserver(onResize);
  ro.observe(canvas);
  ro.observe(timeCanvas);

  // =========================
  // スケール変換ヘルパー
  //   論理座標 → 画面座標の均等スケール（アスペクト比保持、中央配置）
  // =========================
  function getTransform(canvasW, canvasH, baseW, baseH) {
    const sx = canvasW / baseW;
    const sy = canvasH / baseH;
    const scale = Math.min(sx, sy);
    const offsetX = (canvasW - baseW * scale) / 2;
    const offsetY = (canvasH - baseH * scale) / 2;
    return { scale, offsetX, offsetY };
  }

  function applyTransform(c, t) {
    c.setTransform(t.scale, 0, 0, t.scale, t.offsetX, t.offsetY);
  }

  function resetTransform(c) {
    c.setTransform(1, 0, 0, 1, 0, 0);
  }

  // =========================
  // シミュレーション変数
  // =========================
  let v  = 0;       // 波の位相進行（論理座標単位）
  let f  = 1;
  let fr = 1;
  let av = 4;

  const strobePoints   = [];
  let   lastStrobeTime = null;
  const strobeInterval = 200;
  const strobeLifetime = 1000;

  const timeData     = [];
  let   simTime      = 0;
  let   lastAnimTime = null;
  const timeWindow   = 10;

  // =========================
  // 矢頭描画ヘルパー
  // =========================
  function drawArrowHead(c, x, y, angle, len) {
    c.beginPath();
    c.moveTo(x - len * Math.cos(angle - 0.4), y - len * Math.sin(angle - 0.4));
    c.lineTo(x, y);
    c.lineTo(x - len * Math.cos(angle + 0.4), y - len * Math.sin(angle + 0.4));
    c.stroke();
  }

  // 波の変位（論理座標）
  function waveDisp(lx) {
    return AMP * Math.sin((lx - v) * 2 * Math.PI / WAVELENGTH);
  }

  // =========================
  // 上のグラフ（進行波 x-y）
  // =========================
  function drawWaveGraph(ts) {
    if (CW === 0 || CH === 0) return;

    resetTransform(ctx);
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, CW, CH);

    const t = getTransform(CW, CH, BASE_W, BASE_H);
    applyTransform(ctx, t);

    const centerY = BASE_H / 2;
    const margin  = 16 + FONT_SIZE;

    // --- 停止中: 波形曲線 ---
    if (!running) {
      ctx.strokeStyle = "rgba(60, 120, 180, 0.7)";
      ctx.lineWidth   = 3;
      ctx.beginPath();
      for (let lx = 0; lx <= BASE_W; lx += 2) {
        const y = centerY - waveDisp(lx);
        if (lx === 0) ctx.moveTo(lx, y); else ctx.lineTo(lx, y);
      }
      ctx.stroke();
    }

    // --- 軸 ---
    ctx.strokeStyle = "white";
    ctx.lineWidth   = LINE_W;

    const yTop    = centerY - AMP - margin;
    const yBottom = centerY + AMP + margin;

    ctx.beginPath();
    ctx.moveTo(AXIS_X, yBottom);
    ctx.lineTo(AXIS_X, yTop);
    ctx.stroke();
    drawArrowHead(ctx, AXIS_X, yTop, -Math.PI / 2, ARROW_LEN);

    ctx.beginPath();
    ctx.moveTo(0, centerY);
    ctx.lineTo(BASE_W, centerY);
    ctx.stroke();
    drawArrowHead(ctx, BASE_W, centerY, 0, ARROW_LEN);

    // --- 目盛り ---
    const tickStep = WAVELENGTH / 2;
    const mPerTick = 0.5;
    const tickFontSize = Math.round(FONT_SIZE * 0.7);
    ctx.font = `${tickFontSize}px sans-serif`;
    ctx.textAlign = "center";

    let mVal = 0;
    for (let tx = AXIS_X; tx <= BASE_W; tx += tickStep) {
      ctx.beginPath();
      ctx.moveTo(tx, centerY - TICK_LEN / 2);
      ctx.lineTo(tx, centerY + TICK_LEN / 2);
      ctx.stroke();
      if (Math.abs(mVal) > 0.01) {
        ctx.fillStyle = "white";
        const label = Number.isInteger(mVal) ? String(mVal) : mVal.toFixed(1);
        ctx.fillText(label, tx, centerY + TICK_LEN / 2 + tickFontSize * 0.65);
      }
      mVal += mPerTick;
    }
    mVal = -mPerTick;
    for (let tx = AXIS_X - tickStep; tx >= 0; tx -= tickStep) {
      ctx.beginPath();
      ctx.moveTo(tx, centerY - TICK_LEN / 2);
      ctx.lineTo(tx, centerY + TICK_LEN / 2);
      ctx.stroke();
      ctx.fillStyle = "white";
      const label = Number.isInteger(mVal) ? String(mVal) : mVal.toFixed(1);
      ctx.fillText(label, tx, centerY + TICK_LEN / 2 + tickFontSize * 0.65);
      mVal -= mPerTick;
    }
    ctx.textAlign = "start";

    // ラベル
    ctx.fillStyle = "white";
    ctx.font = `bold ${FONT_SIZE}px sans-serif`;
    const xLabel = "座標 x[m]";
    const tw = ctx.measureText(xLabel).width;
    ctx.fillText(xLabel, BASE_W - tw - ARROW_LEN - 6, centerY - 10);

    const yLabel = "座標 y[m]";
    const yw = ctx.measureText(yLabel).width;
    ctx.fillText(yLabel, AXIS_X - yw / 2, yTop - ARROW_LEN - 4);

    ctx.font = `bold ${TITLE_SIZE}px sans-serif`;
    ctx.textAlign = "center";
    ctx.fillText("波形x-yグラフ", BASE_W / 2, yTop - ARROW_LEN - 4 - FONT_SIZE - 4);
    ctx.textAlign = "start";

    // --- ストロボ ---
    ctx.fillStyle = "rgba(255, 0, 0, 0.8)";
    for (const p of strobePoints) {
      if (ts - p.time <= strobeLifetime) {
        const py = centerY - AMP * p.norm;
        ctx.beginPath();
        ctx.arc(AXIS_X, py, particleR / 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // --- 粒子列 ---
    for (let lx = 0; lx <= BASE_W; lx += particleR) {
      const y = centerY - waveDisp(lx);
      const isOrigin = (Math.abs(lx - AXIS_X) < particleR / 2);
      ctx.fillStyle = isOrigin ? "red" : "#00aaff";
      ctx.beginPath();
      ctx.arc(lx, y, particleR / 2, 0, Math.PI * 2);
      ctx.fill();
    }

    // --- 停止中: 波長λ ---
    if (!running) {
      const peaks = [];
      let firstPeak = ((v + 90) % WAVELENGTH);
      if (firstPeak < 0) firstPeak += WAVELENGTH;
      for (let px = firstPeak; px <= BASE_W; px += WAVELENGTH) peaks.push(px);

      if (peaks.length >= 3) {
        const p2x = peaks[1], p3x = peaks[2];
        const peakY = centerY - AMP;
        const arrowY = peakY - 20;

        ctx.strokeStyle = "rgba(255, 255, 100, 0.8)";
        ctx.lineWidth = LINE_W;
        ctx.setLineDash([6, 4]);
        ctx.beginPath();
        ctx.moveTo(p2x, peakY); ctx.lineTo(p2x, arrowY - 4);
        ctx.moveTo(p3x, peakY); ctx.lineTo(p3x, arrowY - 4);
        ctx.stroke();
        ctx.setLineDash([]);

        const aHL = 10;
        ctx.strokeStyle = "rgba(255, 255, 100, 0.9)";
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(p2x, arrowY); ctx.lineTo(p3x, arrowY); ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(p2x + aHL, arrowY - aHL * 0.6); ctx.lineTo(p2x, arrowY); ctx.lineTo(p2x + aHL, arrowY + aHL * 0.6); ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(p3x - aHL, arrowY - aHL * 0.6); ctx.lineTo(p3x, arrowY); ctx.lineTo(p3x - aHL, arrowY + aHL * 0.6); ctx.stroke();

        ctx.fillStyle = "rgba(255, 255, 100, 0.95)";
        ctx.font = `bold ${FONT_SIZE}px sans-serif`;
        ctx.textAlign = "center";
        ctx.fillText("波長 λ", (p2x + p3x) / 2, arrowY - 8);
        ctx.textAlign = "start";
      }

      // 下側ゼロ交差ベース
      const zeroCrossings = [];
      let firstZero = ((v + 180) % WAVELENGTH);
      if (firstZero < 0) firstZero += WAVELENGTH;
      for (let px = firstZero; px <= BASE_W; px += WAVELENGTH) zeroCrossings.push(px);
      let firstZeroUp = (v % WAVELENGTH);
      if (firstZeroUp < 0) firstZeroUp += WAVELENGTH;
      for (let px = firstZeroUp; px <= BASE_W; px += WAVELENGTH) zeroCrossings.push(px);
      zeroCrossings.sort((a, b) => a - b);

      if (zeroCrossings.length >= 4) {
        const z2x = zeroCrossings[1], z4x = zeroCrossings[3];
        const baseY = centerY + AMP;
        const arrowYb = baseY + 20;

        ctx.strokeStyle = "rgba(255, 255, 100, 0.8)";
        ctx.lineWidth = LINE_W;
        ctx.setLineDash([6, 4]);
        ctx.beginPath();
        ctx.moveTo(z2x, centerY); ctx.lineTo(z2x, arrowYb + 4);
        ctx.moveTo(z4x, centerY); ctx.lineTo(z4x, arrowYb + 4);
        ctx.stroke();
        ctx.setLineDash([]);

        const aHL2 = 10;
        ctx.strokeStyle = "rgba(255, 255, 100, 0.9)";
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(z2x, arrowYb); ctx.lineTo(z4x, arrowYb); ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(z2x + aHL2, arrowYb - aHL2 * 0.6); ctx.lineTo(z2x, arrowYb); ctx.lineTo(z2x + aHL2, arrowYb + aHL2 * 0.6); ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(z4x - aHL2, arrowYb - aHL2 * 0.6); ctx.lineTo(z4x, arrowYb); ctx.lineTo(z4x - aHL2, arrowYb + aHL2 * 0.6); ctx.stroke();

        ctx.fillStyle = "rgba(255, 255, 100, 0.95)";
        ctx.font = `bold ${FONT_SIZE}px sans-serif`;
        ctx.textAlign = "center";
        ctx.fillText("波長 λ", (z2x + z4x) / 2, arrowYb + FONT_SIZE + 4);
        ctx.textAlign = "start";
      }
    }

    resetTransform(ctx);
  }

  // =========================
  // 下のグラフ（時間−変位）
  // =========================
  function drawTimeGraph(currentTime) {
    if (TCW === 0 || TCH === 0) return;

    resetTransform(tctx);
    tctx.fillStyle = "black";
    tctx.fillRect(0, 0, TCW, TCH);

    const t = getTransform(TCW, TCH, TBASE_W, TBASE_H);
    applyTransform(tctx, t);

    const pL = 40, pB = 36;
    const pT = TITLE_SIZE + FONT_SIZE + 16;

    tctx.font = `${FONT_SIZE}px sans-serif`;
    const tLabel = "時刻t[秒]";
    const tw2 = tctx.measureText(tLabel).width;
    const pR = tw2 + 20;

    const plotW   = TBASE_W - pL - pR;
    const plotH   = TBASE_H - pT - pB;
    const centerY = pT + plotH / 2;
    const tMin    = Math.max(0, currentTime - timeWindow);

    // 軸
    tctx.strokeStyle = "white";
    tctx.lineWidth   = LINE_W;
    tctx.beginPath(); tctx.moveTo(pL, centerY); tctx.lineTo(TBASE_W - pR, centerY); tctx.stroke();
    drawArrowHead(tctx, TBASE_W - pR, centerY, 0, ARROW_LEN);
    tctx.beginPath(); tctx.moveTo(pL, TBASE_H - pB); tctx.lineTo(pL, pT); tctx.stroke();
    drawArrowHead(tctx, pL, pT, -Math.PI / 2, ARROW_LEN);

    // 目盛り
    const tickFontSize = Math.round(FONT_SIZE * 0.7);
    tctx.font = `${tickFontSize}px sans-serif`;
    tctx.textAlign = "center";
    tctx.fillStyle = "white";
    const tickInterval = 2;
    const tStart = Math.ceil(tMin / tickInterval) * tickInterval;
    for (let tt = tStart; tt <= currentTime; tt += tickInterval) {
      const tx = pL + ((tt - tMin) / timeWindow) * plotW;
      if (tx < pL || tx > TBASE_W - pR) continue;
      tctx.strokeStyle = "white";
      tctx.beginPath();
      tctx.moveTo(tx, centerY - TICK_LEN / 2);
      tctx.lineTo(tx, centerY + TICK_LEN / 2);
      tctx.stroke();
      tctx.fillText(Math.round(tt) + "秒", tx, centerY + TICK_LEN / 2 + tickFontSize + 2);
    }
    tctx.textAlign = "start";

    // ラベル
    tctx.fillStyle = "white";
    tctx.font = `bold ${FONT_SIZE}px sans-serif`;
    tctx.fillText(tLabel, TBASE_W - tw2 - 6, centerY - 10);

    tctx.font = `bold ${TITLE_SIZE}px sans-serif`;
    tctx.textAlign = "center";
    tctx.fillText("原点媒質(赤玉)の単振動t-yグラフ", TBASE_W / 2, TITLE_SIZE + 4);
    tctx.textAlign = "start";

    tctx.font = `bold ${FONT_SIZE}px sans-serif`;
    tctx.fillText("原点媒質座標y[m]", pL - 24, TITLE_SIZE + 4 + FONT_SIZE + 4);

    // データ描画
    const visible = timeData.filter(p => p.t >= tMin);
    if (visible.length < 2) { resetTransform(tctx); return; }

    const ampPix = plotH * 0.45;

    tctx.strokeStyle = "#00ff88";
    tctx.lineWidth   = LINE_W;
    tctx.beginPath();
    for (let i = 0; i < visible.length; i++) {
      const p = visible[i];
      const x = pL + ((p.t - tMin) / timeWindow) * plotW;
      const y = centerY - p.disp * ampPix;
      if (i === 0) tctx.moveTo(x, y); else tctx.lineTo(x, y);
    }
    tctx.stroke();

    // 赤玉
    const last = visible[visible.length - 1];
    const lx = pL + ((last.t - tMin) / timeWindow) * plotW;
    const ly = centerY - last.disp * ampPix;
    tctx.fillStyle = "red";
    tctx.beginPath();
    tctx.arc(lx, ly, DOT_R, 0, Math.PI * 2);
    tctx.fill();

    // 矢頭
    if (visible.length >= 3) {
      const arrowSize = 24;
      const i0 = visible.length - 3;
      const i1 = visible.length - 1;
      const x0 = pL + ((visible[i0].t - tMin) / timeWindow) * plotW;
      const y0 = centerY - visible[i0].disp * ampPix;
      const x1 = pL + ((visible[i1].t - tMin) / timeWindow) * plotW;
      const y1 = centerY - visible[i1].disp * ampPix;
      const angle = Math.atan2(y1 - y0, x1 - x0);
      const tipX = lx - Math.cos(angle) * (DOT_R + arrowSize * 0.1);
      const tipY = ly - Math.sin(angle) * (DOT_R + arrowSize * 0.1);
      tctx.strokeStyle = "#00ff88";
      tctx.lineWidth = 3;
      drawArrowHead(tctx, tipX, tipY, angle, arrowSize);
    }

    // 停止中: 周期T
    if (!running && timeData.length > 10) {
      const crossings = [];
      for (let i = 1; i < timeData.length; i++) {
        const prev = timeData[i - 1].disp;
        const curr = timeData[i].disp;
        if ((prev >= 0 && curr < 0) || (prev < 0 && curr >= 0)) {
          const ratio = Math.abs(prev) / (Math.abs(prev) + Math.abs(curr));
          const tCross = timeData[i - 1].t + ratio * (timeData[i].t - timeData[i - 1].t);
          crossings.push(tCross);
        }
      }
      const visibleCrossings = crossings.filter(tc => tc >= tMin && tc <= currentTime);

      if (visibleCrossings.length >= 3) {
        const t2 = visibleCrossings[0], t4 = visibleCrossings[2];
        const x2 = pL + ((t2 - tMin) / timeWindow) * plotW;
        const x4 = pL + ((t4 - tMin) / timeWindow) * plotW;
        const bottomY = centerY + ampPix;
        const arrowYb = bottomY + 20;

        tctx.strokeStyle = "rgba(255, 255, 100, 0.8)";
        tctx.lineWidth = LINE_W;
        tctx.setLineDash([6, 4]);
        tctx.beginPath();
        tctx.moveTo(x2, centerY); tctx.lineTo(x2, arrowYb + 4);
        tctx.moveTo(x4, centerY); tctx.lineTo(x4, arrowYb + 4);
        tctx.stroke();
        tctx.setLineDash([]);

        const aHL = 10;
        tctx.strokeStyle = "rgba(255, 255, 100, 0.9)";
        tctx.lineWidth = 3;
        tctx.beginPath(); tctx.moveTo(x2, arrowYb); tctx.lineTo(x4, arrowYb); tctx.stroke();
        tctx.beginPath();
        tctx.moveTo(x2 + aHL, arrowYb - aHL * 0.6); tctx.lineTo(x2, arrowYb); tctx.lineTo(x2 + aHL, arrowYb + aHL * 0.6); tctx.stroke();
        tctx.beginPath();
        tctx.moveTo(x4 - aHL, arrowYb - aHL * 0.6); tctx.lineTo(x4, arrowYb); tctx.lineTo(x4 - aHL, arrowYb + aHL * 0.6); tctx.stroke();

        tctx.fillStyle = "rgba(255, 255, 100, 0.95)";
        tctx.font = `bold ${FONT_SIZE}px sans-serif`;
        tctx.textAlign = "center";
        tctx.fillText("周期 T", (x2 + x4) / 2, arrowYb + FONT_SIZE + 4);
        tctx.textAlign = "start";
      }
    }

    resetTransform(tctx);
  }

  // =========================
  // 描画のみ（リサイズ時用）
  // =========================
  function drawOnly(ts, currentTime) {
    if (CW === 0) return;
    drawWaveGraph(ts);
    drawTimeGraph(currentTime);
  }

  // =========================
  // メイン描画（データ更新＋描画）
  // =========================
  function drawFrame(ts, currentTime) {
    if (CW === 0) return;

    // 原点の正規化変位（論理座標で計算）
    const normAtOrigin = Math.sin((AXIS_X - v) * 2 * Math.PI / WAVELENGTH);

    // ストロボ更新
    if (lastStrobeTime === null) lastStrobeTime = ts;
    if (ts - lastStrobeTime >= strobeInterval) {
      strobePoints.push({ norm: normAtOrigin, time: ts });
      lastStrobeTime = ts;
    }
    for (let i = strobePoints.length - 1; i >= 0; i--) {
      if (ts - strobePoints[i].time > strobeLifetime) strobePoints.splice(i, 1);
    }

    timeData.push({ t: currentTime, disp: normAtOrigin });
    if (timeData.length > 2000) timeData.shift();

    drawOnly(ts, currentTime);
  }

  // =========================
  // アニメーション
  // =========================
  let rafId   = null;
  let running = false;

  function step(ts) {
    if (!running) { rafId = null; return; }
    if (lastAnimTime === null) lastAnimTime = ts;
    const dt = (ts - lastAnimTime) / 1000;
    lastAnimTime = ts;

    if (fr) {
      v += f * av;       // 論理座標単位で進行
      simTime += dt;
    }

    drawFrame(ts, simTime);
    rafId = requestAnimationFrame(step);
  }

  function startLoop() {
    if (running) return;
    running = true;
    lastAnimTime = null;
    rafId = requestAnimationFrame(step);
  }
  function stopLoop() {
    running = false;
    if (rafId !== null) cancelAnimationFrame(rafId);
    rafId = null;
    drawOnly(performance.now(), simTime);
  }

  // =========================
  // ボタン
  // =========================
  function updateDirectionButtons() {
    btnDirR.classList.toggle("selected-direction", f === 1);
    btnDirL.classList.toggle("selected-direction", f === -1);
  }
  function updateSpeedButtons() {
    btnFast.classList.toggle("selected-direction", av === 4);
    btnSlow.classList.toggle("selected-direction", av === 1);
  }

  btnDirR.onclick  = () => { f = 1;   updateDirectionButtons(); };
  btnDirL.onclick  = () => { f = -1;  updateDirectionButtons(); };
  btnFast.onclick  = () => { av = 4;  updateSpeedButtons(); };
  btnSlow.onclick  = () => { av = 1;  updateSpeedButtons(); };
  btnStart.onclick = startLoop;
  btnStop.onclick  = stopLoop;

  const btnSize = document.getElementById("sizeToggle");
  function updateSizeButton() {
    btnSize.textContent = particleSizeSmall ? "大きい媒質で表示" : "小さい媒質で表示";
  }
  btnSize.onclick = () => {
    particleSizeSmall = !particleSizeSmall;
    particleR = particleSizeSmall ? PARTICLE_R_S : PARTICLE_R_L;
    updateSizeButton();
  };

  // 初期化
  syncCanvasSize();
  drawOnly(performance.now(), simTime);
  updateDirectionButtons();
  updateSpeedButtons();
  updateSizeButton();
  startLoop();
</script>
</body>
</html>
