<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>横波 進行波</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: #000;
      height: 100dvh;
      overflow: hidden;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      padding: 8px;
      gap: 6px;
    }

    h3 {
      color: #0ff;
      font-size: clamp(14px, 3.5vw, 20px);
      flex-shrink: 0;
    }

    /* ---- ボタン群 ---- */
    #controls {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 4px;
      flex-shrink: 0;
    }
    button {
      padding: 6px 2px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #111;
      color: #ddd;
      cursor: pointer;
      font-size: clamp(10px, 2.5vw, 14px);
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
      min-height: 32px;
    }
    button:active { background: #222; }
    .selected-direction {
      background-color: #00aaff !important;
      color: #fff !important;
      font-weight: bold;
    }

    /* ---- キャンバス領域 ---- */
    .canvas-wrap {
      flex: 1 1 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    #myCanvas {
      flex: 5;
      min-height: 0;
    }
    #timeCanvas {
      flex: 4;
      min-height: 0;
    }
    canvas {
      display: block;
      width: 100%;
      background: #000;
      border-radius: 4px;
    }
    .graph-label {
      color: #9aa;
      font-size: clamp(10px, 2.5vw, 13px);
      text-align: center;
      flex-shrink: 0;
      padding: 2px 0;
    }
  </style>
</head>
<body>
<div id="app">
  <h3>進行波（横波）</h3>

  <div id="controls">
    <button id="start">▶ 再生</button>
    <button id="stop">⏸ 停止</button>
    <button id="dirx">→ 右向き進行波</button>
    <button id="dirxx">← 左向き進行波</button>
    <button id="sph">普通の速度</button>
    <button id="spl">ゆっくり</button>
  </div>

  <div class="canvas-wrap">
    <canvas id="myCanvas"></canvas>
    <canvas id="timeCanvas"></canvas>
  </div>
</div>

<script>
  // =========================
  // 要素取得
  // =========================
  const canvas     = document.getElementById("myCanvas");
  const ctx        = canvas.getContext("2d");
  const timeCanvas = document.getElementById("timeCanvas");
  const tctx       = timeCanvas.getContext("2d");

  const btnStart = document.getElementById("start");
  const btnStop  = document.getElementById("stop");
  const btnDirR  = document.getElementById("dirx");
  const btnDirL  = document.getElementById("dirxx");
  const btnFast  = document.getElementById("sph");
  const btnSlow  = document.getElementById("spl");

  // =========================
  // Canvas設定（レスポンシブ）
  // =========================
  let CW = 0, CH = 0, TCH = 0;
  const DPR = Math.min(window.devicePixelRatio || 1, 2);

  function syncCanvasSize() {
    const rect1 = canvas.getBoundingClientRect();
    const rect2 = timeCanvas.getBoundingClientRect();

    canvas.width      = Math.round(rect1.width  * DPR);
    canvas.height     = Math.round(rect1.height * DPR);
    timeCanvas.width  = Math.round(rect2.width  * DPR);
    timeCanvas.height = Math.round(rect2.height * DPR);

    CW  = canvas.width;
    CH  = canvas.height;
    TCH = timeCanvas.height;
  }

  function onResize() {
    syncCanvasSize();
    // 描画のみ（データ更新なし）
    drawOnly(performance.now(), simTime);
  }
  const ro = new ResizeObserver(onResize);
  ro.observe(canvas);
  ro.observe(timeCanvas);

  // =========================
  // スケール計算ヘルパー
  // =========================
  function S(basePx) {
    return Math.max(basePx * 0.5, basePx * (CW / 1000));
  }

  // =========================
  // シミュレーション変数
  // =========================
  let v  = 0;
  let f  = 1;
  let fr = 1;
  let av = 4;   // 普通=4, ゆっくり=1

  // ストロボデータ（正規化座標 -1〜1 で保存）
  const strobePoints   = [];   // { norm, time }  norm = sin値
  let   lastStrobeTime = null;
  const strobeInterval = 200;
  const strobeLifetime = 1000;

  // 時間−変位グラフ（正規化値 -1〜1）
  const timeData     = [];
  let   simTime      = 0;
  let   lastAnimTime = null;
  const timeWindow   = 10;

  // =========================
  // 矢頭描画ヘルパー
  // =========================
  function drawArrowHead(c, x, y, angle, len) {
    c.beginPath();
    c.moveTo(x - len * Math.cos(angle - 0.4), y - len * Math.sin(angle - 0.4));
    c.lineTo(x, y);
    c.lineTo(x - len * Math.cos(angle + 0.4), y - len * Math.sin(angle + 0.4));
    c.stroke();
  }

  // =========================
  // 上のグラフ（進行波）— 軸描画
  // =========================
  function drawAxes() {
    const axisX    = S(100);
    const fontSize = Math.max(18, Math.round(S(32)));
    const amp      = CH / 4;              // 波の振幅(px)
    const margin   = S(16) + fontSize;    // 軸端の余白（ラベル分を加算）
    const tickLen  = S(8);                // 目盛り線の長さ
    const arrowLen = S(24);               // 矢頭の長さ

    ctx.strokeStyle = "white";
    ctx.lineWidth   = Math.max(1, S(2));

    // --- 縦軸（波の振幅＋余白に収める）---
    const yTop    = CH / 2 - amp - margin;
    const yBottom = CH / 2 + amp + margin;
    ctx.beginPath();
    ctx.moveTo(axisX, yBottom);
    ctx.lineTo(axisX, yTop);
    ctx.stroke();
    // 縦軸矢頭（上向き）
    drawArrowHead(ctx, axisX, yTop, -Math.PI / 2, arrowLen);

    // --- 横軸 ---
    ctx.beginPath();
    ctx.moveTo(0, CH / 2);
    ctx.lineTo(CW, CH / 2);
    ctx.stroke();
    // 横軸矢頭（右向き）
    drawArrowHead(ctx, CW, CH / 2, 0, arrowLen);

    // --- 横軸の目盛り ---
    // 波長 = 360px（基準スケール）。1波長 = 1m とする。
    // 目盛り間隔: 0.5m = 180基準px
    const tickStep = S(180);   // 0.5m 刻み
    const mPerTick = 0.5;
    ctx.font = `${Math.round(fontSize * 0.7)}px sans-serif`;
    ctx.textAlign = "center";

    // 原点(axisX)から右へ
    let mVal = 0;
    for (let tx = axisX; tx <= CW; tx += tickStep) {
      ctx.beginPath();
      ctx.moveTo(tx, CH / 2 - tickLen / 2);
      ctx.lineTo(tx, CH / 2 + tickLen / 2);
      ctx.stroke();
      if (Math.abs(mVal) > 0.01) {  // 0 は省略
        const label = Number.isInteger(mVal) ? String(mVal) : mVal.toFixed(1);
        ctx.fillStyle = "white";
        ctx.fillText(label, tx, CH / 2 + tickLen / 2 + fontSize * 0.65);
      }
      mVal += mPerTick;
    }
    // 原点から左へ
    mVal = -mPerTick;
    for (let tx = axisX - tickStep; tx >= 0; tx -= tickStep) {
      ctx.beginPath();
      ctx.moveTo(tx, CH / 2 - tickLen / 2);
      ctx.lineTo(tx, CH / 2 + tickLen / 2);
      ctx.stroke();
      const label = Number.isInteger(mVal) ? String(mVal) : mVal.toFixed(1);
      ctx.fillStyle = "white";
      ctx.fillText(label, tx, CH / 2 + tickLen / 2 + fontSize * 0.65);
      mVal -= mPerTick;
    }

    ctx.textAlign = "start";  // リセット

    // --- 横軸ラベル「座標 x[m]」— 矢頭の左 ---
    ctx.fillStyle = "white";
    ctx.font = `bold ${fontSize}px sans-serif`;
    const xLabel = "座標 x[m]";
    const tw = ctx.measureText(xLabel).width;
    ctx.fillText(xLabel, CW - tw - arrowLen - S(6), CH / 2 - S(10));

    // --- 縦軸ラベル「座標 y[m]」— 矢頭の上 ---
    ctx.fillStyle = "white";
    ctx.font = `bold ${fontSize}px sans-serif`;
    const yLabel = "座標 y[m]";
    const yw = ctx.measureText(yLabel).width;
    ctx.fillText(yLabel, axisX - yw / 2, yTop - arrowLen - S(4));

    // --- グラフタイトル「波形x-yグラフ」— 「座標 y[m]」の1行上 ---
    const titleSize = Math.max(20, Math.round(S(38)));
    ctx.fillStyle = "white";
    ctx.font = `bold ${titleSize}px sans-serif`;
    ctx.textAlign = "center";
    ctx.fillText("波形x-yグラフ", CW / 2, yTop - arrowLen - S(4) - fontSize - S(4));
    ctx.textAlign = "start";
  }

  // =========================
  // 下のグラフ（時間−変位）— 描画のみ
  // =========================
  function drawTimeGraph(currentTime) {
    tctx.fillStyle = "black";
    tctx.fillRect(0, 0, CW, TCH);

    const pL = S(40), pB = S(36);
    const fontSize  = Math.max(18, Math.round(S(32)));
    const titleSize = Math.max(20, Math.round(S(38)));
    const pT = titleSize + fontSize + S(16);  // タイトル1行 + ラベル1行 + 余白

    // 右パディング: 「時刻t[秒]」ラベル幅 + 余白
    tctx.font = `${fontSize}px sans-serif`;
    const tLabel = "時刻t[秒]";
    const tw2 = tctx.measureText(tLabel).width;
    const pR = tw2 + S(20);

    const plotW   = CW - pL - pR;
    const plotH   = TCH - pT - pB;
    const centerY = pT + plotH / 2;
    const tMin    = Math.max(0, currentTime - timeWindow);
    const arrowLen = S(24);

    // 軸
    tctx.strokeStyle = "white";
    tctx.lineWidth   = Math.max(1, S(2));
    // 横軸
    tctx.beginPath();
    tctx.moveTo(pL, centerY);
    tctx.lineTo(CW - pR, centerY);
    tctx.stroke();
    drawArrowHead(tctx, CW - pR, centerY, 0, arrowLen);
    // 縦軸
    tctx.strokeStyle = "white";
    tctx.beginPath();
    tctx.moveTo(pL, TCH - pB);
    tctx.lineTo(pL, pT);
    tctx.stroke();
    drawArrowHead(tctx, pL, pT, -Math.PI / 2, arrowLen);

    // --- 横軸の目盛り（時刻） ---
    const tickLen = S(8);
    const tickFontSize = Math.round(fontSize * 0.7);
    tctx.font = `${tickFontSize}px sans-serif`;
    tctx.textAlign = "center";
    tctx.fillStyle = "white";
    // 2秒刻み
    const tickInterval = 2;
    const tStart = Math.ceil(tMin / tickInterval) * tickInterval;
    for (let t = tStart; t <= currentTime; t += tickInterval) {
      const tx = pL + ((t - tMin) / timeWindow) * plotW;
      if (tx < pL || tx > CW - pR) continue;
      tctx.strokeStyle = "white";
      tctx.beginPath();
      tctx.moveTo(tx, centerY - tickLen / 2);
      tctx.lineTo(tx, centerY + tickLen / 2);
      tctx.stroke();
      tctx.fillText(Math.round(t) + "秒", tx, centerY + tickLen / 2 + tickFontSize + S(2));
    }
    tctx.textAlign = "start";

    // 横軸ラベル（軸の右端より右に配置）
    tctx.fillStyle = "white";
    tctx.font = `bold ${fontSize}px sans-serif`;
    tctx.fillText(tLabel, CW - tw2 - S(6), centerY - S(10));

    // グラフタイトル — 上から1行目
    tctx.fillStyle = "white";
    tctx.font = `bold ${titleSize}px sans-serif`;
    tctx.textAlign = "center";
    tctx.fillText("原点媒質(赤玉)の単振動t-yグラフ", CW / 2, titleSize + S(4));
    tctx.textAlign = "start";

    // 縦軸ラベル — タイトルの下（上から2行目）
    tctx.font = `bold ${fontSize}px sans-serif`;
    tctx.fillText("原点媒質座標y[m]", pL - S(24), titleSize + S(4) + fontSize + S(4));

    // データ描画
    const visible = timeData.filter(p => p.t >= tMin);
    if (visible.length < 2) return;

    const ampPix = plotH * 0.45;

    tctx.strokeStyle = "#00ff88";
    tctx.lineWidth   = Math.max(1, S(2));
    tctx.beginPath();
    for (let i = 0; i < visible.length; i++) {
      const p = visible[i];
      const x = pL + ((p.t - tMin) / timeWindow) * plotW;
      const y = centerY - p.disp * ampPix;
      if (i === 0) tctx.moveTo(x, y); else tctx.lineTo(x, y);
    }
    tctx.stroke();

    // 現在点（赤玉）
    const last = visible[visible.length - 1];
    const lx = pL + ((last.t - tMin) / timeWindow) * plotW;
    const ly = centerY - last.disp * ampPix;
    tctx.fillStyle = "red";
    tctx.beginPath();
    tctx.arc(lx, ly, S(10), 0, Math.PI * 2);
    tctx.fill();

    // --- 赤玉の先に矢頭 ---
    if (visible.length >= 3) {
      const arrowSize = S(28);
      const dotR = S(10);
      // 接線方向を末尾付近の点から算出
      const i0 = visible.length - 3;
      const i1 = visible.length - 1;
      const x0 = pL + ((visible[i0].t - tMin) / timeWindow) * plotW;
      const y0 = centerY - visible[i0].disp * ampPix;
      const x1 = pL + ((visible[i1].t - tMin) / timeWindow) * plotW;
      const y1 = centerY - visible[i1].disp * ampPix;
      const angle = Math.atan2(y1 - y0, x1 - x0);
      // 矢頭の先端を赤玉の少し後ろ（進行方向の逆）にオフセット
      const tipX = lx - Math.cos(angle) * (dotR + arrowSize * 0.1);
      const tipY = ly - Math.sin(angle) * (dotR + arrowSize * 0.1);
      tctx.strokeStyle = "#00ff88";
      tctx.lineWidth = Math.max(2, S(3));
      drawArrowHead(tctx, tipX, tipY, angle, arrowSize);
    }

    // --- 停止中: 周期Tの表示 ---
    if (!running && timeData.length > 10) {
      // timeData全体からゼロ交差点を探す
      const crossings = [];
      for (let i = 1; i < timeData.length; i++) {
        const prev = timeData[i - 1].disp;
        const curr = timeData[i].disp;
        if ((prev >= 0 && curr < 0) || (prev < 0 && curr >= 0)) {
          const ratio = Math.abs(prev) / (Math.abs(prev) + Math.abs(curr));
          const tCross = timeData[i - 1].t + ratio * (timeData[i].t - timeData[i - 1].t);
          crossings.push(tCross);
        }
      }

      // 表示範囲内のゼロ交差点をフィルタ
      const visibleCrossings = crossings.filter(t => t >= tMin && t <= currentTime);

      // 1番目と3番目のゼロ交差点（= 1周期分）
      if (visibleCrossings.length >= 3) {
        const t2 = visibleCrossings[0];
        const t4 = visibleCrossings[2];
        const x2 = pL + ((t2 - tMin) / timeWindow) * plotW;
        const x4 = pL + ((t4 - tMin) / timeWindow) * plotW;
        const bottomY = centerY + ampPix;    // 谷の底
        const arrowYb = bottomY + S(20);     // 矢印の y 位置（谷の下）
        const periodFontSize = Math.max(18, Math.round(S(32)));

        // 両端の縦破線
        tctx.strokeStyle = "rgba(255, 255, 100, 0.8)";
        tctx.lineWidth = Math.max(1, S(2));
        tctx.setLineDash([S(6), S(4)]);
        tctx.beginPath();
        tctx.moveTo(x2, centerY);
        tctx.lineTo(x2, arrowYb + S(4));
        tctx.moveTo(x4, centerY);
        tctx.lineTo(x4, arrowYb + S(4));
        tctx.stroke();
        tctx.setLineDash([]);

        // 両矢印
        const aHL = S(10);
        tctx.strokeStyle = "rgba(255, 255, 100, 0.9)";
        tctx.lineWidth = Math.max(2, S(3));

        // 水平線
        tctx.beginPath();
        tctx.moveTo(x2, arrowYb);
        tctx.lineTo(x4, arrowYb);
        tctx.stroke();

        // 左矢じり
        tctx.beginPath();
        tctx.moveTo(x2 + aHL, arrowYb - aHL * 0.6);
        tctx.lineTo(x2, arrowYb);
        tctx.lineTo(x2 + aHL, arrowYb + aHL * 0.6);
        tctx.stroke();

        // 右矢じり
        tctx.beginPath();
        tctx.moveTo(x4 - aHL, arrowYb - aHL * 0.6);
        tctx.lineTo(x4, arrowYb);
        tctx.lineTo(x4 - aHL, arrowYb + aHL * 0.6);
        tctx.stroke();

        // 「周期T」テキスト（矢印の下）
        tctx.fillStyle = "rgba(255, 255, 100, 0.95)";
        tctx.font = `bold ${periodFontSize}px sans-serif`;
        tctx.textAlign = "center";
        tctx.fillText("周期 T", (x2 + x4) / 2, arrowYb + periodFontSize + S(4));
        tctx.textAlign = "start";
      }
    }
  }

  // =========================
  // 描画のみ（データ更新しない）— リサイズ時用
  // =========================
  function drawOnly(ts, currentTime) {
    if (CW === 0) return;

    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, CW, CH);

    const particleR = S(20);
    const axisX     = S(100);
    const amp       = CH / 4;

    // --- 停止中: なめらかな波形曲線（粒子の下に描く）---
    if (!running) {
      ctx.strokeStyle = "rgba(60, 120, 180, 0.7)";
      ctx.lineWidth   = Math.max(2, S(3));
      ctx.beginPath();
      for (let px = 0; px <= CW; px += 2) {
        const y = CH / 2 - amp * Math.sin((px - v) * 2 * Math.PI / 360);
        if (px === 0) ctx.moveTo(px, y); else ctx.lineTo(px, y);
      }
      ctx.stroke();
    }

    drawAxes();

    // ストロボ描画（正規化値→現在のピクセルに変換）
    ctx.fillStyle = "rgba(255, 0, 0, 0.8)";
    for (const p of strobePoints) {
      if (ts - p.time <= strobeLifetime) {
        const py = CH / 2 - amp * p.norm;
        ctx.beginPath();
        ctx.arc(axisX, py, particleR / 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // 粒子列
    for (let x = 0; x <= CW; x += particleR) {
      const y = CH / 2 - amp * Math.sin((x - v) * 2 * Math.PI / 360);
      const isOrigin = (Math.abs(x - axisX) < particleR / 2);
      ctx.fillStyle = isOrigin ? "red" : "#00aaff";
      ctx.beginPath();
      ctx.arc(x, y, particleR / 2, 0, Math.PI * 2);
      ctx.fill();
    }

    // --- 停止中: 波長λ表示 ---
    if (!running) {
      // ピーク（山）の x 座標を探す
      // sin((x - v) * 2π/360) = 1 のとき山 → x - v = 90 + 360*n → x = v + 90 + 360*n
      const wavelengthPx = 360;   // sin式の固定波長（スケーリングなし）
      const peaks = [];
      // v + 90 を基準に、画面左端以降の最初のピークを求める
      let firstPeak = ((v + 90) % wavelengthPx);
      if (firstPeak < 0) firstPeak += wavelengthPx;
      for (let px = firstPeak; px <= CW; px += wavelengthPx) {
        peaks.push(px);
      }

      // 2番目と3番目のピークがあれば表示
      if (peaks.length >= 3) {
        const p2x = peaks[1];
        const p3x = peaks[2];
        const peakY = CH / 2 - amp;   // 山の頂上の y 座標
        const arrowY = peakY - S(20); // 矢印の y 位置（山の少し上）
        const fontSize = Math.max(18, Math.round(S(32)));

        // 両端の縦線
        ctx.strokeStyle = "rgba(255, 255, 100, 0.8)";
        ctx.lineWidth = Math.max(1, S(2));
        ctx.setLineDash([S(6), S(4)]);
        ctx.beginPath();
        ctx.moveTo(p2x, peakY);
        ctx.lineTo(p2x, arrowY - S(4));
        ctx.moveTo(p3x, peakY);
        ctx.lineTo(p3x, arrowY - S(4));
        ctx.stroke();
        ctx.setLineDash([]);

        // 両矢印「↔」
        const arrowHeadLen = S(10);
        ctx.strokeStyle = "rgba(255, 255, 100, 0.9)";
        ctx.lineWidth = Math.max(2, S(3));

        // 水平線
        ctx.beginPath();
        ctx.moveTo(p2x, arrowY);
        ctx.lineTo(p3x, arrowY);
        ctx.stroke();

        // 左矢じり
        ctx.beginPath();
        ctx.moveTo(p2x + arrowHeadLen, arrowY - arrowHeadLen * 0.6);
        ctx.lineTo(p2x, arrowY);
        ctx.lineTo(p2x + arrowHeadLen, arrowY + arrowHeadLen * 0.6);
        ctx.stroke();

        // 右矢じり
        ctx.beginPath();
        ctx.moveTo(p3x - arrowHeadLen, arrowY - arrowHeadLen * 0.6);
        ctx.lineTo(p3x, arrowY);
        ctx.lineTo(p3x - arrowHeadLen, arrowY + arrowHeadLen * 0.6);
        ctx.stroke();

        // 「波長λ」テキスト
        ctx.fillStyle = "rgba(255, 255, 100, 0.95)";
        ctx.font = `bold ${fontSize}px sans-serif`;
        ctx.textAlign = "center";
        ctx.fillText("波長 λ", (p2x + p3x) / 2, arrowY - S(8));
        ctx.textAlign = "start";
      }

      // --- 下側: ゼロ交差点（正→負）ベースの波長λ表示 ---
      // sin((x - v) * 2π/360) = 0 で正→負に交差: x - v = 180 + 360*n → x = v + 180 + 360*n
      const zeroCrossings = [];
      let firstZero = ((v + 180) % wavelengthPx);
      if (firstZero < 0) firstZero += wavelengthPx;
      for (let px = firstZero; px <= CW; px += wavelengthPx) {
        zeroCrossings.push(px);
      }
      // 正→負だけでなく負→正も追加: x = v + 360*n
      let firstZeroUp = (v % wavelengthPx);
      if (firstZeroUp < 0) firstZeroUp += wavelengthPx;
      for (let px = firstZeroUp; px <= CW; px += wavelengthPx) {
        zeroCrossings.push(px);
      }
      zeroCrossings.sort((a, b) => a - b);

      // 2番目と4番目のゼロ交差点（= 1波長分）
      if (zeroCrossings.length >= 4) {
        const z2x = zeroCrossings[1];
        const z4x = zeroCrossings[3];
        const baseY = CH / 2 + amp;        // 谷の底
        const arrowYb = baseY + S(20);     // 矢印の y 位置（谷の下）
        const fontSize2 = Math.max(18, Math.round(S(32)));

        // 両端の縦破線
        ctx.strokeStyle = "rgba(255, 255, 100, 0.8)";
        ctx.lineWidth = Math.max(1, S(2));
        ctx.setLineDash([S(6), S(4)]);
        ctx.beginPath();
        ctx.moveTo(z2x, CH / 2);
        ctx.lineTo(z2x, arrowYb + S(4));
        ctx.moveTo(z4x, CH / 2);
        ctx.lineTo(z4x, arrowYb + S(4));
        ctx.stroke();
        ctx.setLineDash([]);

        // 両矢印
        const arrowHeadLen2 = S(10);
        ctx.strokeStyle = "rgba(255, 255, 100, 0.9)";
        ctx.lineWidth = Math.max(2, S(3));

        // 水平線
        ctx.beginPath();
        ctx.moveTo(z2x, arrowYb);
        ctx.lineTo(z4x, arrowYb);
        ctx.stroke();

        // 左矢じり
        ctx.beginPath();
        ctx.moveTo(z2x + arrowHeadLen2, arrowYb - arrowHeadLen2 * 0.6);
        ctx.lineTo(z2x, arrowYb);
        ctx.lineTo(z2x + arrowHeadLen2, arrowYb + arrowHeadLen2 * 0.6);
        ctx.stroke();

        // 右矢じり
        ctx.beginPath();
        ctx.moveTo(z4x - arrowHeadLen2, arrowYb - arrowHeadLen2 * 0.6);
        ctx.lineTo(z4x, arrowYb);
        ctx.lineTo(z4x - arrowHeadLen2, arrowYb + arrowHeadLen2 * 0.6);
        ctx.stroke();

        // 「波長λ」テキスト（矢印の下）
        ctx.fillStyle = "rgba(255, 255, 100, 0.95)";
        ctx.font = `bold ${fontSize2}px sans-serif`;
        ctx.textAlign = "center";
        ctx.fillText("波長 λ", (z2x + z4x) / 2, arrowYb + fontSize2 + S(4));
        ctx.textAlign = "start";
      }
    }

    drawTimeGraph(currentTime);
  }

  // =========================
  // メイン描画（データ更新＋描画）— アニメーション時用
  // =========================
  function drawFrame(ts, currentTime) {
    if (CW === 0) return;

    const axisX = S(100);

    // 原点の正規化変位
    const normAtOrigin = Math.sin((axisX - v) * 2 * Math.PI / 360);

    // ストロボ更新（正規化値で保存）
    if (lastStrobeTime === null) lastStrobeTime = ts;
    if (ts - lastStrobeTime >= strobeInterval) {
      strobePoints.push({ norm: normAtOrigin, time: ts });
      lastStrobeTime = ts;
    }
    for (let i = strobePoints.length - 1; i >= 0; i--) {
      if (ts - strobePoints[i].time > strobeLifetime) strobePoints.splice(i, 1);
    }

    // 時系列データ更新（正規化値で保存）
    timeData.push({ t: currentTime, disp: normAtOrigin });
    if (timeData.length > 2000) timeData.shift();

    // 描画
    drawOnly(ts, currentTime);
  }

  // =========================
  // アニメーション
  // =========================
  let rafId   = null;
  let running = false;

  function step(ts) {
    if (!running) { rafId = null; return; }
    if (lastAnimTime === null) lastAnimTime = ts;
    const dt = (ts - lastAnimTime) / 1000;
    lastAnimTime = ts;

    if (fr) {
      v += f * av;
      simTime += dt;
    }

    drawFrame(ts, simTime);
    rafId = requestAnimationFrame(step);
  }

  function startLoop() {
    if (running) return;
    running = true;
    lastAnimTime = null;
    rafId = requestAnimationFrame(step);
  }
  function stopLoop() {
    running = false;
    if (rafId !== null) cancelAnimationFrame(rafId);
    rafId = null;
    // 停止時の表示を反映
    drawOnly(performance.now(), simTime);
  }

  // =========================
  // ボタン
  // =========================
  function updateDirectionButtons() {
    btnDirR.classList.toggle("selected-direction", f === 1);
    btnDirL.classList.toggle("selected-direction", f === -1);
  }
  function updateSpeedButtons() {
    btnFast.classList.toggle("selected-direction", av === 4);
    btnSlow.classList.toggle("selected-direction", av === 1);
  }

  btnDirR.onclick  = () => { f = 1;   updateDirectionButtons(); };
  btnDirL.onclick  = () => { f = -1;  updateDirectionButtons(); };
  btnFast.onclick  = () => { av = 4;  updateSpeedButtons(); };
  btnSlow.onclick  = () => { av = 1;  updateSpeedButtons(); };
  btnStart.onclick = startLoop;
  btnStop.onclick  = stopLoop;

  // 初期化
  syncCanvasSize();
  drawOnly(performance.now(), simTime);
  updateDirectionButtons();
  updateSpeedButtons();
  startLoop();
</script>
</body>
</html>
