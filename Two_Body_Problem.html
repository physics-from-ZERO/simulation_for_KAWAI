<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>例題6 (2) シミュレーション</title>
  <style>
    html, body {
      margin: 0; padding: 0; overflow: hidden;
      background: #0a0a0f; color: #e0e0e0;
      font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
      touch-action: manipulation;
      -webkit-user-select: none; user-select: none;
    }
    canvas { display: block; }

    .panel {
      position: absolute;
      background: rgba(20, 20, 35, 0.92);
      border: 1px solid rgba(100, 140, 255, 0.2);
      border-radius: 8px;
      padding: 14px 18px;
      font-size: 13px;
      line-height: 1.7;
      backdrop-filter: blur(8px);
    }
    .panel h3 {
      margin: 0 0 8px 0;
      font-size: 14px;
      color: #7ab4ff;
      letter-spacing: 0.5px;
      border-bottom: 1px solid rgba(100, 140, 255, 0.15);
      padding-bottom: 6px;
    }
    .hl { color: #5ec4ff; font-weight: 600; }
    .hl-red { color: #ff6b6b; font-weight: 600; }
    .hl-green { color: #6bffb8; font-weight: 600; }
    .hl-yellow { color: #ffd966; font-weight: 600; }

    #ui {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: rgba(10, 10, 20, 0.93);
      border-top: 1px solid rgba(100, 140, 255, 0.2);
      padding: 6px 12px 8px;
      display: flex; flex-direction: column; gap: 3px;
    }
    .slider-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px 14px;
    }
    .slider-row {
      display: flex; align-items: center; gap: 4px;
      font-size: 11px; color: #9ab0cc;
    }
    .slider-row .lbl {
      min-width: 58px; text-align: right; font-size: 10px;
      white-space: nowrap;
    }
    .slider-row input[type="range"] {
      flex: 1; min-width: 0;
      height: 14px;
      accent-color: #5ec4ff;
    }
    .slider-row .val {
      color: #5ec4ff; font-weight: 600;
      min-width: 30px; text-align: right; font-size: 11px;
    }
    .btn-row {
      display: flex; gap: 10px; justify-content: center;
      margin-top: 2px;
    }
    button {
      background: transparent;
      border: 2px solid #5ec4ff;
      color: #5ec4ff;
      padding: 10px 28px;
      font-size: 15px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 700;
      min-height: 44px;
    }
    button:hover, button:active {
      background: #5ec4ff;
      color: #0a0a0f;
    }
    #resetBtn {
      border-color: #ff9966;
      color: #ff9966;
    }
    #resetBtn:hover, #resetBtn:active {
      background: #ff9966;
      color: #0a0a0f;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>


  <div id="ui">
    <div class="slider-grid">
      <div class="slider-row"><span class="lbl">m:</span><input id="sl_m" type="range" min="0.5" max="5" step="0.1" value="1"><span class="val" id="v_m">1.0</span></div>
      <div class="slider-row"><span class="lbl">F/mg:</span><input id="sl_F" type="range" min="0.5" max="5" step="0.1" value="2"><span class="val" id="v_F">2.0</span></div>
      <div class="slider-row"><span class="lbl">μ₁(A-机):</span><input id="sl_mu1" type="range" min="0" max="0.5" step="0.01" value="0.25"><span class="val" id="v_mu1">0.25</span></div>
      <div class="slider-row"><span class="lbl">μ₂(B-A):</span><input id="sl_mu2" type="range" min="0" max="0.5" step="0.01" value="0.12"><span class="val" id="v_mu2">0.12</span></div>
      <div class="slider-row"><span class="lbl">距離 l:</span><input id="sl_l" type="range" min="0.5" max="5" step="0.1" value="5"><span class="val" id="v_l">5.0</span></div>
      <div class="slider-row"><span class="lbl">速度:</span><input id="sl_speed" type="range" min="0.1" max="3" step="0.1" value="0.5"><span class="val" id="v_speed">0.5</span></div>
    </div>
    <div class="btn-row">
      <button id="startBtn">▶ Start</button>
      <button id="resetBtn">↺ Reset</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let W, H, uiH = 0;
    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      const uiEl = document.getElementById('ui');
      if (uiEl) uiH = uiEl.offsetHeight;
    }
    window.addEventListener('resize', resize);
    resize();
    // Re-measure after fonts load
    setTimeout(resize, 100);

    // --- Sliders ---
    const sliders = {
      m: document.getElementById('sl_m'),
      F: document.getElementById('sl_F'),
      mu1: document.getElementById('sl_mu1'),
      mu2: document.getElementById('sl_mu2'),
      l: document.getElementById('sl_l'),
      speed: document.getElementById('sl_speed'),
    };
    const vals = {
      m: document.getElementById('v_m'),
      F: document.getElementById('v_F'),
      mu1: document.getElementById('v_mu1'),
      mu2: document.getElementById('v_mu2'),
      l: document.getElementById('v_l'),
      speed: document.getElementById('v_speed'),
    };

    // --- State ---
    const g = 9.8;
    let params = {};
    let speedFactor = 1;
    let running = false;
    let simDone = false;
    let endReason = '';
    let time = 0;
    const dt = 0.005;

    // Phase 1: A,B together or B sliding on A
    // Phase 2: B has left A, both move independently
    let phase = 1;

    // Positions (absolute)
    let xA = 0, vA = 0;
    let xB = 0, vB = 0;
    // B's initial position relative to A's left edge
    let bRelPos = 0; // distance from A's left end to B (initially = l from left end... wait)

    // In the problem: B starts at some position on A, distance l from A's left edge
    // A has length L_A (we'll set visually)
    let L_A = 4; // length of A in meters (visual)

    // Initial positions for ghost/afterimage
    let initXA = 0, initBRelPos = 0;
    let ghostVisible = false;

    // Trace
    let traceA = [], traceB = [];
    const maxTrace = 2000;

    // Theoretical
    let theory = {};

    function readParams() {
      const m = parseFloat(sliders.m.value);
      const Fcoeff = parseFloat(sliders.F.value);
      const mu1 = parseFloat(sliders.mu1.value);
      const mu2 = parseFloat(sliders.mu2.value);
      const l = parseFloat(sliders.l.value);
      speedFactor = parseFloat(sliders.speed.value);

      params = { m, M: 3 * m, F: Fcoeff * m * g, mu1, mu2, g, l };

      vals.m.textContent = m.toFixed(1);
      vals.F.textContent = Fcoeff.toFixed(1);
      vals.mu1.textContent = mu1.toFixed(2);
      vals.mu2.textContent = mu2.toFixed(2);
      vals.l.textContent = l.toFixed(1);
      vals.speed.textContent = speedFactor.toFixed(1);

      L_A = Math.max(params.l + 1.5, 4);
    }

    function calcTheory() {
      const { m, M, F, mu1, mu2, g, l } = params;
      // Total weight on table = (M + m)g
      // Friction on bottom of A from table: f1 = mu1 * (M + m) * g (opposing A's motion, leftward)
      // Friction on top of A from B: f2 = mu2 * m * g
      //   B slides LEFT relative to A → B moves slower than A
      //   so friction on B from A is RIGHTWARD (accelerates B)
      //   and friction on A from B is LEFTWARD (decelerates A)

      // For A: F - f1 - f2 = M * aA
      // aA = (F - mu1*(M+m)*g - mu2*m*g) / M
      const f1 = mu1 * (M + m) * g;
      const f2 = mu2 * m * g;
      const aA = (F - f1 - f2) / M;

      // For B: f2 = m * aB  (friction from A pushes B rightward)
      const aB = mu2 * g;

      // Relative acceleration of B w.r.t. A
      const aRel = aB - aA; // negative means B moves left relative to A

      // Time for B to reach left edge: B starts at distance l from left edge
      // Relative displacement = -l (B moves left by l relative to A)
      // -l = 0.5 * aRel * t^2  (initial relative velocity = 0)
      // t = sqrt(2*l / |aRel|)  if aRel < 0
      let tFall = Infinity;
      if (aRel < 0) {
        tFall = Math.sqrt(2 * l / Math.abs(aRel));
      }

      // Velocities at that time
      const vA_at_t = aA * tFall;
      const vB_at_t = aB * tFall;

      // Positions at that time
      const xA_at_t = 0.5 * aA * tFall * tFall;
      const xB_at_t = 0.5 * aB * tFall * tFall;

      theory = { aA, aB, aRel, tFall, vA_at_t, vB_at_t, xA_at_t, xB_at_t, f1, f2 };
    }

    function resetSim() {
      time = 0;
      phase = 1;
      xA = 0; vA = 0;
      xB = 0; vB = 0;
      bRelPos = params.l; // distance from left edge of A to B
      traceA = [{ x: 0, v: 0, t: 0 }];
      traceB = [{ x: 0, v: 0, t: 0 }];
      simDone = false;
      endReason = '';
      ghostVisible = false;
      running = false;
      document.getElementById('startBtn').textContent = '▶ Start';
    }

    function init() {
      readParams();
      calcTheory();
      resetSim();
      updateDisplays();
    }

    // --- Slider events ---
    Object.keys(sliders).forEach(k => {
      sliders[k].addEventListener('input', () => {
        readParams();
        calcTheory();
        if (!running) {
          resetSim();
        }
        updateDisplays();
      });
    });

    document.getElementById('startBtn').addEventListener('click', () => {
      if (simDone) return;
      running = !running;
      document.getElementById('startBtn').textContent = running ? '⏸ Pause' : '▶ Start';
      if (running && !ghostVisible) {
        // Save initial positions for ghost
        initXA = xA;
        initBRelPos = bRelPos;
        ghostVisible = true;
      }
    });
    const DEFAULTS = { m: '1', F: '2', mu1: '0.25', mu2: '0.12', l: '5', speed: '0.5' };

    document.getElementById('resetBtn').addEventListener('click', () => {
      // Reset all sliders to default values
      Object.keys(DEFAULTS).forEach(k => {
        sliders[k].value = DEFAULTS[k];
      });
      readParams();
      calcTheory();
      resetSim();
      updateDisplays();
    });

    // --- Physics step ---
    function step(dtStep) {
      if (simDone) return;
      const { m, M, F, mu1, mu2, g, l } = params;

      if (phase === 1) {
        // A and B on A, B sliding on A
        const f1 = mu1 * (M + m) * g;
        const f2 = mu2 * m * g;

        // A: F - f1 - f2 = M * aA  (f2 opposes A from B friction)
        const aA_now = (F - f1 - f2) / M;
        // B: f2 = m * aB
        const aB_now = f2 / m; // = mu2 * g

        vA += aA_now * dtStep;
        vB += aB_now * dtStep;
        xA += vA * dtStep;
        xB += vB * dtStep;

        // Update B's relative position on A
        // bRelPos = initial_l - (xA - xB) ... 
        // Actually: B's position relative to A's left edge
        // At t=0, B is at distance l from left edge, A's left edge is at xA - L_A (but let's think simpler)
        // Let's track: bRelPos = l - (xA - xB)
        // When xA moves faster than xB, xA - xB grows, bRelPos shrinks
        bRelPos = l - (xA - xB);

        if (bRelPos <= 0) {
          // B reached left edge of A
          bRelPos = 0;
          phase = 2;
          simDone = true;
          endReason = 'BがAの左端に到達！ t = ' + time.toFixed(3) + ' s';
          running = false;
          document.getElementById('startBtn').textContent = '▶ Start';
        }
      }

      time += dtStep;
      traceA.push({ x: xA, v: vA, t: time });
      traceB.push({ x: xB, v: vB, t: time });
      if (traceA.length > maxTrace) traceA.splice(0, 1);
      if (traceB.length > maxTrace) traceB.splice(0, 1);
    }

    // --- Drawing ---
    const SCALE_BASE = 50; // pixels per meter base

    function getScale() {
      const visH = H - uiH;
      return Math.min(W, visH) * 0.06;
    }

    function worldToScreen(wx, wy) {
      const s = getScale();
      const visH = H - uiH;
      const cx = W * 0.35;
      const cy = visH * 0.42;
      return { x: cx + wx * s, y: cy - wy * s };
    }

    function drawGrid() {
      const s = getScale();
      ctx.strokeStyle = 'rgba(60, 80, 120, 0.15)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let i = 0; i <= W; i += s) {
        ctx.moveTo(i, 0); ctx.lineTo(i, H);
      }
      for (let j = 0; j <= H; j += s) {
        ctx.moveTo(0, j); ctx.lineTo(W, j);
      }
      ctx.stroke();
    }

    function drawTable() {
      const s = getScale();
      const tableY = worldToScreen(0, 0).y;
      // Table surface
      ctx.strokeStyle = '#4a6a8a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, tableY);
      ctx.lineTo(W, tableY);
      ctx.stroke();

      // Hatching below
      ctx.strokeStyle = 'rgba(74, 106, 138, 0.3)';
      ctx.lineWidth = 1;
      for (let x = 0; x < W; x += 12) {
        ctx.beginPath();
        ctx.moveTo(x, tableY);
        ctx.lineTo(x - 15, tableY + 20);
        ctx.stroke();
      }
    }

    function drawArrow(x1, y1, x2, y2, color, lineW) {
      const dx = x2 - x1, dy = y2 - y1;
      const len = Math.sqrt(dx * dx + dy * dy);
      if (len < 2) return;
      const angle = Math.atan2(dy, dx);
      const headLen = Math.min(12, len * 0.35);

      ctx.strokeStyle = color;
      ctx.lineWidth = lineW || 2;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();

      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(x2, y2);
      ctx.lineTo(x2 - headLen * Math.cos(angle - 0.4), y2 - headLen * Math.sin(angle - 0.4));
      ctx.lineTo(x2 - headLen * Math.cos(angle + 0.4), y2 - headLen * Math.sin(angle + 0.4));
      ctx.closePath();
      ctx.fill();
    }

    function drawGhost() {
      if (!ghostVisible) return;
      // Don't draw ghost if objects haven't moved yet
      if (time < 0.01) return;

      const s = getScale();
      const aH = s * 0.8;
      const aW = L_A * s;
      const bSize = s * 0.5;

      // Ghost A position (initial)
      const gALeft = worldToScreen(initXA - L_A, 0);

      // Ghost A rectangle
      ctx.fillStyle = 'rgba(70, 130, 200, 0.1)';
      ctx.strokeStyle = 'rgba(100, 170, 255, 0.25)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([6, 4]);
      ctx.fillRect(gALeft.x, gALeft.y - aH, aW, aH);
      ctx.strokeRect(gALeft.x, gALeft.y - aH, aW, aH);
      ctx.setLineDash([]);

      // Ghost A label
      ctx.fillStyle = 'rgba(160, 200, 255, 0.35)';
      ctx.font = 'bold 14px sans-serif';
      ctx.textAlign = 'center';
      const gACx = gALeft.x + aW / 2;
      ctx.fillText('A₀', gACx, gALeft.y - aH / 2 + 5);

      // Ghost B position (initial)
      const gBWorldX = (initXA - L_A) + initBRelPos;
      const gBLeft = worldToScreen(gBWorldX, 0);

      // Ghost B rectangle
      ctx.fillStyle = 'rgba(255, 120, 80, 0.1)';
      ctx.strokeStyle = 'rgba(255, 150, 100, 0.25)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([6, 4]);
      ctx.fillRect(gBLeft.x, gBLeft.y - aH - bSize, bSize, bSize);
      ctx.strokeRect(gBLeft.x, gBLeft.y - aH - bSize, bSize, bSize);
      ctx.setLineDash([]);

      // Ghost B label
      ctx.fillStyle = 'rgba(255, 170, 136, 0.35)';
      ctx.font = 'bold 12px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('B₀', gBLeft.x + bSize / 2, gBLeft.y - aH - bSize / 2 + 4);
    }

    function drawDisplacementMarkers() {
      if (!ghostVisible) return;
      if (time < 0.01) return;

      const s = getScale();
      const aH = s * 0.8;
      const aW = L_A * s;
      const bSize = s * 0.5;
      const tableY = worldToScreen(0, 0).y;

      // --- Ghost positions (initial) ---
      const gALeft = worldToScreen(initXA - L_A, 0);
      const gARight = worldToScreen(initXA, 0);
      const gBWorldX = (initXA - L_A) + initBRelPos;
      const gBLeft = worldToScreen(gBWorldX, 0);
      const gBCx = gBLeft.x + bSize / 2;

      // --- Current positions ---
      const aLeft = worldToScreen(xA - L_A, 0);
      const aRight = worldToScreen(xA, 0);
      const bWorldX = (xA - L_A) + bRelPos;
      const bScreenLeft = worldToScreen(bWorldX, 0);
      const bCx = bScreenLeft.x + bSize / 2;
      const aCx = (aLeft.x + aRight.x) / 2;

      // Reference point for A: use center of A
      const gACx = (gALeft.x + gARight.x) / 2;

      // ==============================
      // 1. Vertical dashed reference lines
      // ==============================
      ctx.setLineDash([5, 4]);
      ctx.lineWidth = 3;

      // LEFT shared vertical line at ghost B's LEFT EDGE (shared origin for x_B and x_A)
      const sharedLeftX = gBLeft.x;
      ctx.strokeStyle = '#c8c8c8';
      ctx.beginPath();
      ctx.moveTo(sharedLeftX, gBLeft.y - aH - bSize - 30);
      ctx.lineTo(sharedLeftX, tableY + 110);
      ctx.stroke();

      // MIDDLE vertical line for x_B: current B's left edge
      ctx.strokeStyle = '#ff9966';
      ctx.beginPath();
      ctx.moveTo(bScreenLeft.x, bScreenLeft.y - aH - bSize - 30);
      ctx.lineTo(bScreenLeft.x, tableY + 65);
      ctx.stroke();

      // RIGHT vertical line for x_A: the point on A that was originally aligned
      // with B's left edge. This point stays fixed relative to A, so it moves with A.
      // World x = xA - L_A + initBRelPos (same relative offset on A)
      const aRefPoint = worldToScreen(xA - L_A + initBRelPos, 0);
      ctx.strokeStyle = '#5ec4ff';
      ctx.beginPath();
      ctx.moveTo(aRefPoint.x, aLeft.y - aH - 5);
      ctx.lineTo(aRefPoint.x, tableY + 110);
      ctx.stroke();

      ctx.setLineDash([]);

      // ==============================
      // 2. x_B arrow (B's displacement, above the bodies)
      //    From shared left line to current B's left edge
      // ==============================
      const xB_arrowY = gBLeft.y - aH - bSize - 20;
      if (Math.abs(bScreenLeft.x - sharedLeftX) > 3) {
        drawArrow(sharedLeftX, xB_arrowY, bScreenLeft.x, xB_arrowY, '#ff9966', 2.5);
        ctx.fillStyle = '#ff9966';
        ctx.font = 'bold 13px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('x_B', (sharedLeftX + bScreenLeft.x) / 2, xB_arrowY - 10);
        ctx.font = '11px sans-serif';
        ctx.fillText(xB.toFixed(3) + ' m', (sharedLeftX + bScreenLeft.x) / 2, xB_arrowY + 16);
      }

      // ==============================
      // 3. x_A arrow (A's displacement, below the table)
      //    From shared left line to A's reference point (moves with A)
      // ==============================
      const xA_arrowY = tableY + 85;
      if (Math.abs(aRefPoint.x - sharedLeftX) > 3) {
        drawArrow(sharedLeftX, xA_arrowY, aRefPoint.x, xA_arrowY, '#5ec4ff', 2.5);
        ctx.fillStyle = '#5ec4ff';
        ctx.font = 'bold 13px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('x_A', (sharedLeftX + aRefPoint.x) / 2, xA_arrowY - 10);
        ctx.font = '11px sans-serif';
        ctx.fillText(xA.toFixed(3) + ' m', (sharedLeftX + aRefPoint.x) / 2, xA_arrowY + 16);
      }

      // ==============================
      // 4. l arrow (shown only when simulation stopped)
      //    Between A's right dashed line (aRefPoint.x) and B's middle dashed line (bScreenLeft.x)
      //    This is the relative displacement of B w.r.t. A
      // ==============================
      if (simDone && Math.abs(aRefPoint.x - bScreenLeft.x) > 3) {
        const lArrowY = xB_arrowY;
        // Double-headed arrow between the two lines
        drawArrow(bScreenLeft.x, lArrowY, aRefPoint.x, lArrowY, '#ff4444', 2.5);
        drawArrow(aRefPoint.x, lArrowY, bScreenLeft.x, lArrowY, '#ff4444', 2.5);
        ctx.fillStyle = '#ff4444';
        ctx.font = 'bold 15px sans-serif';
        ctx.textAlign = 'center';
        const midLx = (bScreenLeft.x + aRefPoint.x) / 2;
        ctx.fillText('l', midLx, lArrowY - 12);
        ctx.font = '12px sans-serif';
        ctx.fillText(params.l.toFixed(1) + ' m', midLx, lArrowY + 18);
      }
    }

    function drawBodies() {
      const s = getScale();
      const { l } = params;

      // A's visual: rectangle on table
      const aH = s * 0.8; // height of A
      const aW = L_A * s;  // width of A

      // A's left edge in world coords: xA (xA is position of A's right end? Let's say xA is center... 
      // Actually let's say xA is the position of A's reference point = right edge (where force is applied)
      // So A spans from xA - L_A to xA

      const aLeft = worldToScreen(xA - L_A, 0);
      const aRight = worldToScreen(xA, 0);

      // Draw A
      ctx.fillStyle = 'rgba(70, 130, 200, 0.4)';
      ctx.strokeStyle = 'rgba(100, 170, 255, 0.7)';
      ctx.lineWidth = 2;
      ctx.fillRect(aLeft.x, aLeft.y - aH, aW, aH);
      ctx.strokeRect(aLeft.x, aLeft.y - aH, aW, aH);

      // Label A
      ctx.fillStyle = '#a0c8ff';
      ctx.font = 'bold 16px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('A (3m)', (aLeft.x + aRight.x) / 2, aLeft.y - aH / 2 + 5);

      // Label mass
      ctx.font = '11px sans-serif';
      ctx.fillStyle = '#7aa0c8';
      ctx.fillText('3m = ' + params.M.toFixed(1) + ' kg', (aLeft.x + aRight.x) / 2, aLeft.y - aH / 2 + 22);

      // B position: B sits on top of A
      // B's world x = xA - L_A + bRelPos + (B_width/2 effectively)
      // Actually bRelPos is distance from A's left edge to B's left edge (or center)
      const bSize = s * 0.5;
      const bWorldX = (xA - L_A) + bRelPos; // B's left edge in world x
      const bScreen = worldToScreen(bWorldX + bSize / (2 * s), 0);

      // Draw B
      ctx.fillStyle = 'rgba(255, 120, 80, 0.5)';
      ctx.strokeStyle = 'rgba(255, 150, 100, 0.8)';
      ctx.lineWidth = 2;
      const bScreenLeft = worldToScreen(bWorldX, 0);
      ctx.fillRect(bScreenLeft.x, bScreenLeft.y - aH - bSize, bSize, bSize);
      ctx.strokeRect(bScreenLeft.x, bScreenLeft.y - aH - bSize, bSize, bSize);

      // Label B
      ctx.fillStyle = '#ffaa88';
      ctx.font = 'bold 14px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('B (m)', bScreenLeft.x + bSize / 2, bScreenLeft.y - aH - bSize / 2 + 4);

      // --- Draw force arrow on A (external force, rightward) ---
      const forceScale = s * 0.015;
      const Flen = params.F * forceScale;
      const forceY = aLeft.y - aH / 2;
      drawArrow(aRight.x, forceY, aRight.x + Math.max(Flen, 20), forceY, '#ffd966', 3);
      ctx.fillStyle = '#ffd966';
      ctx.font = 'bold 12px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText('F = ' + params.F.toFixed(1) + ' N', aRight.x + Math.max(Flen, 20) + 6, forceY - 6);

      // --- Draw friction arrows ---
      // f1: table on A, leftward (opposing motion)
      if (vA > 0.001 || time > 0.01) {
        const f1 = theory.f1 || 0;
        const f1len = f1 * forceScale;
        const f1y = aLeft.y + 3;
        drawArrow(aLeft.x + aW / 2, f1y, aLeft.x + aW / 2 - Math.max(f1len, 15), f1y, '#66bb6a', 2);
        ctx.fillStyle = '#66bb6a';
        ctx.font = '11px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('f₁=' + f1.toFixed(1) + 'N', aLeft.x + aW / 2 - Math.max(f1len, 15) / 2, f1y + 14);
      }

      // f2: friction between B and A
      // On B: rightward (pushes B forward)
      if (phase === 1 && (time > 0.01)) {
        const f2 = theory.f2 || 0;
        const f2len = f2 * forceScale;
        const f2yB = bScreenLeft.y - aH - bSize / 2;
        drawArrow(bScreenLeft.x + bSize / 2, f2yB, bScreenLeft.x + bSize / 2 + Math.max(f2len, 10), f2yB, '#ef5350', 2);
        ctx.fillStyle = '#ef5350';
        ctx.font = '10px sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText('f₂=' + f2.toFixed(1) + 'N', bScreenLeft.x + bSize / 2 + Math.max(f2len, 10) + 4, f2yB - 4);

        // On A from B: leftward
        const f2yA = bScreenLeft.y - aH + 3;
        drawArrow(bScreenLeft.x + bSize / 2, f2yA, bScreenLeft.x + bSize / 2 - Math.max(f2len, 10), f2yA, '#ef5350', 1.5);
      }

      // (distance marker l is now drawn in drawDisplacementMarkers)

      // --- Velocity vectors ---
      const velScale = s * 0.15;

      // vA arrow
      if (Math.abs(vA) > 0.01) {
        const vAlen = vA * velScale;
        const vAy = aLeft.y - aH - bSize - 50;
        const vAx = (aLeft.x + aRight.x) / 2;
        drawArrow(vAx, vAy, vAx + vAlen, vAy, '#5ec4ff', 2);
        ctx.fillStyle = '#5ec4ff';
        ctx.font = '11px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('vA=' + vA.toFixed(2) + ' m/s', vAx + vAlen / 2, vAy - 8);
      }

      // vB arrow
      if (Math.abs(vB) > 0.01) {
        const vBlen = vB * velScale;
        const vBy = bScreenLeft.y - aH - bSize - 70;
        const vBx = bScreenLeft.x + bSize / 2;
        drawArrow(vBx, vBy, vBx + vBlen, vBy, '#ff8866', 2);
        ctx.fillStyle = '#ff8866';
        ctx.font = '11px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('vB=' + vB.toFixed(2) + ' m/s', vBx + vBlen / 2, vBy - 8);
      }
    }

    function drawTraces() {
      const s = getScale();
      const baseY = worldToScreen(0, 0).y;
      const traceY = baseY + 40;

      // A trace
      if (traceA.length > 1) {
        ctx.strokeStyle = 'rgba(94, 196, 255, 0.4)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let i = 0; i < traceA.length; i++) {
          const sx = worldToScreen(traceA[i].x, 0).x;
          const sy = traceY + traceA[i].t * s * 0.5;
          if (i === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
        }
        ctx.stroke();
      }

      // B trace
      if (traceB.length > 1) {
        ctx.strokeStyle = 'rgba(255, 136, 102, 0.4)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let i = 0; i < traceB.length; i++) {
          const sx = worldToScreen(traceB[i].x, 0).x;
          const sy = traceY + traceB[i].t * s * 0.5;
          if (i === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
        }
        ctx.stroke();
      }
    }

    function updateDisplays() {
      // Panels removed; nothing to update here
    }

    function drawWatermark() {
      ctx.save();
      ctx.globalAlpha = 0.06;
      ctx.font = 'bold 60px sans-serif';
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.translate(W / 2, H / 2);
      ctx.rotate(-Math.PI / 6);
      ctx.fillText('例題6 (2) シミュレーション', 0, 0);
      ctx.restore();
    }

    function drawStatusOnCanvas() {
      // Show time and status info directly on canvas (top-right area)
      const pad = 12;
      ctx.textAlign = 'right';
      ctx.font = 'bold 14px sans-serif';
      ctx.fillStyle = '#ffd966';
      ctx.fillText('t = ' + time.toFixed(2) + ' s', W - pad, 24);

      if (simDone) {
        ctx.fillStyle = '#ff6b6b';
        ctx.font = 'bold 13px sans-serif';
        ctx.fillText('BがAの左端に到達', W - pad, 44);
      }
    }

    // --- Main loop ---
    function animate() {
      if (running && !simDone) {
        const steps = Math.max(1, Math.round(speedFactor * 4));
        for (let i = 0; i < steps; i++) {
          step(dt);
          if (simDone) break;
        }
        updateDisplays();
      }

      ctx.clearRect(0, 0, W, H);
      drawGrid();
      drawTable();
      drawGhost();
      drawBodies();
      drawDisplacementMarkers();
      drawStatusOnCanvas();
      drawWatermark();

      requestAnimationFrame(animate);
    }

    init();
    animate();
  </script>
</body>
</html>
