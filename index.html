<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>波動シミュレーション</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
}

/* タブ */
#tabs {
  display: flex;
}
#tabs button {
  flex: 1;
  padding: 10px 4px;
  background: #111;
  color: #aaa;
  border: 1px solid #444;
  font-size: clamp(13px, 3.5vw, 16px);
  cursor: pointer;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
#tabs button.active-tab {
  background: #00aaff;
  color: #fff;
  font-weight: bold;
}

/* iframe：重ねて配置し、visibility で切り替え */
#frame-container {
  position: relative;
  width: 100%;
  height: calc(100dvh - 46px);
}
.viewer {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: none;
  visibility: hidden;
}
.viewer.active {
  visibility: visible;
}
</style>
</head>
<body>

<!-- タブ -->
<div id="tabs">
  <button id="tabWave" class="active-tab">進行波</button>
  <button id="tabLongTrans">縦波横波</button>
  <button id="tabStanding">定在波</button>
</div>

<!-- iframeで読み込み -->
<div id="frame-container">
  <iframe id="waveFrame" class="viewer active" src="shinkoha.html"></iframe>
  <iframe id="standingFrame" class="viewer" src="teizaiha.html"></iframe>
  <iframe id="longTransFrame" class="viewer" src="tatenami-yokonami.html"></iframe>
</div>

<script>
const tabs = document.querySelectorAll("#tabs button");
const frames = document.querySelectorAll(".viewer");

const tabMap = {
  tabWave:     "waveFrame",
  tabStanding: "standingFrame",
  tabLongTrans: "longTransFrame"
};

tabs.forEach(tab => {
  tab.addEventListener("click", () => {
    // 全タブ非アクティブ
    tabs.forEach(t => t.classList.remove("active-tab"));
    frames.forEach(f => f.classList.remove("active"));

    // クリックされたタブをアクティブに
    tab.classList.add("active-tab");
    const frameId = tabMap[tab.id];
    document.getElementById(frameId).classList.add("active");
  });
});
</script>

</body>
</html>
